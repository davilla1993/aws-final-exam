AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  Pipeline d'Ingestion de Données IoT en Temps Réel (Serverless) -
  Examen Final Introduction à AWS

# ──────────────────────────────────────────────────────────────────────────────
# PARAMÈTRES
# ──────────────────────────────────────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: fgbossou-iot-pipeline
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: Minuscules, chiffres et tirets uniquement
    Description: Préfixe utilisé pour nommer toutes les ressources

# ──────────────────────────────────────────────────────────────────────────────
# GLOBALS — Propriétés partagées par toutes les fonctions SAM
# ──────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 128

# ──────────────────────────────────────────────────────────────────────────────
# RESSOURCES
# ──────────────────────────────────────────────────────────────────────────────
Resources:

  # ============================================================
  # [1] S3 — Data Lake (stockage brut des données IoT)
  # ============================================================
  DataLakeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::AccountId}-${ProjectName}-data-lake"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ============================================================
  # [2] DYNAMODB — Feature Store analytique (métriques agrégées)
  # ============================================================
  IoTMetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-iot-metrics"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH

  # ============================================================
  # [3] IAM — Rôle d'exécution Lambda (permissions minimales)
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-lambda-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3DataLakeWrite
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "arn:aws:s3:::${DataLakeBucket}/*"
              - Sid: DynamoDBWrite
                Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt IoTMetricsTable.Arn
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-ingestion"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-ingestion:*"

  # ============================================================
  # [4] SAM HTTP API — SAM crée automatiquement le Stage $default
  # ============================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${ProjectName}-http-api"
      CorsConfiguration:
        AllowMethods:
          - POST
          - OPTIONS
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type

  # ============================================================
  # [5] SAM FUNCTION — Lambda Python 3.11
  #     SAM crée automatiquement : Integration + Route + Permission
  #     L'event HttpApi relie la fonction à la route POST /
  # ============================================================
  IoTIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-ingestion"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          S3_BUCKET: !Ref DataLakeBucket
          DYNAMODB_TABLE: !Ref IoTMetricsTable
      Events:
        PostIngestion:
          Type: HttpApi
          Properties:
            Path: /
            Method: POST
            ApiId: !Ref HttpApi
      InlineCode: |
        import json
        import boto3
        import uuid
        import logging
        import os
        from datetime import datetime
        from decimal import Decimal

        logger = logging.getLogger()
        logger.setLevel(logging.INFO)

        s3_client = boto3.client('s3')
        dynamodb = boto3.resource('dynamodb')


        def handler(event, context):
            logger.info("Incoming event: %s", json.dumps(event))
            try:
                body_raw = event.get('body')
                if not body_raw:
                    return _response(400, {'message': 'Missing request body'})

                try:
                    payload = json.loads(body_raw)
                except json.JSONDecodeError as exc:
                    logger.error("JSON decode error: %s", exc)
                    return _response(400, {'message': 'Invalid JSON'})

                measurements = payload.get('measurements')
                if not measurements or not isinstance(measurements, list):
                    return _response(400, {
                        'message': 'Invalid payload: measurements missing or not a list'
                    })

                for idx, m in enumerate(measurements):
                    for field in ('sensor_id', 'temperature', 'status'):
                        if field not in m:
                            return _response(400, {
                                'message': f'Missing field "{field}" in measurement at index {idx}'
                            })

                request_id = str(uuid.uuid4())
                now = datetime.utcnow()
                timestamp = now.isoformat()

                temperatures = [float(m['temperature']) for m in measurements]
                avg_temp = round(sum(temperatures) / len(temperatures), 2)
                error_count = sum(
                    1 for m in measurements
                    if str(m.get('status', '')).upper() == 'ERROR'
                )

                bucket = os.environ['S3_BUCKET']
                s3_key = (
                    f"raw-zone/year={now.strftime('%Y')}"
                    f"/month={now.strftime('%m')}"
                    f"/day={now.strftime('%d')}"
                    f"/{request_id}.json"
                )

                s3_client.put_object(
                    Bucket=bucket,
                    Key=s3_key,
                    Body=json.dumps(payload),
                    ContentType='application/json'
                )
                logger.info("S3 write OK: s3://%s/%s", bucket, s3_key)

                table = dynamodb.Table(os.environ['DYNAMODB_TABLE'])
                table.put_item(Item={
                    'request_id': request_id,
                    'timestamp': timestamp,
                    's3_path': f"s3://{bucket}/{s3_key}",
                    'average_temperature': Decimal(str(avg_temp)),
                    'error_count': error_count,
                })
                logger.info("DynamoDB write OK: request_id=%s", request_id)

                return _response(201, {
                    'message': 'Data ingested successfully',
                    'request_id': request_id,
                    's3_path': f"s3://{bucket}/{s3_key}",
                    'average_temperature': avg_temp,
                    'error_count': error_count,
                })

            except Exception as exc:
                logger.error("Unexpected error: %s", exc, exc_info=True)
                return _response(500, {'message': f'Internal server error: {str(exc)}'})


        def _response(status_code, body):
            return {
                'statusCode': status_code,
                'headers': {'Content-Type': 'application/json'},
                'body': json.dumps(body),
            }

  # ============================================================
  # [6] CLOUDWATCH — Log Group explicite avec rétention 7 jours
  # ============================================================
  IoTFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-ingestion"
      RetentionInDays: 7

  # ============================================================
  # [6b] CLOUDFRONT INGESTION — CDN devant API Gateway
  #     CachingDisabled      : POST IoT jamais mis en cache
  #     AllViewerExceptHostHeader : transmet tous les headers sauf Host
  # ============================================================
  CloudFrontIngestion:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} IoT Ingestion CDN"
        HttpVersion: http2
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad       # AWS Managed: CachingDisabled (POST ne doit jamais être mis en cache)
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AWS Managed: AllViewerExceptHostHeader (transmet tous les headers sauf Host)
          AllowedMethods:
            - DELETE
            - GET
            - HEAD
            - OPTIONS
            - PATCH
            - POST
            - PUT
          CachedMethods:
            - GET
            - HEAD

  # ============================================================
  # [7] S3 DOCUMENTATION — Bucket privé (tout accès public bloqué)
  # ============================================================
  DocBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::AccountId}-${ProjectName}-tech-doc"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ============================================================
  # [8] OAC — Origin Access Control (SigV4, remplace l'ancien OAI)
  # ============================================================
  DocumentationOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-doc-oac"
        Description: OAC sécurisé pour le bucket de documentation technique
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ============================================================
  # [9] CLOUDFRONT DOCUMENTATION — CDN devant S3 via OAC
  #     CachingOptimized : contenu statique HTML
  # ============================================================
  CloudFrontDoc:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} Technical Documentation CDN"
        DefaultRootObject: index.html
        HttpVersion: http2
        Origins:
          - Id: DocS3Origin
            DomainName: !GetAtt DocBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref DocumentationOAC
        DefaultCacheBehavior:
          TargetOriginId: DocS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD

  # ============================================================
  # [10] BUCKET POLICY — Autorise uniquement la distribution CloudFront
  #      Condition sur l'ARN exact : aucune autre distribution ne peut accéder
  # ============================================================
  DocBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOACOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${DocBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDoc}"

# ──────────────────────────────────────────────────────────────────────────────
# OUTPUTS — Visibles dans l'onglet Outputs de la pile CloudFormation
# ──────────────────────────────────────────────────────────────────────────────
Outputs:

  CloudFrontIngestionURL:
    Description: "Point d'entrée CDN pour l'ingestion des données IoT (POST /)"
    Value: !Sub "https://${CloudFrontIngestion.DomainName}"

  CloudFrontDocURL:
    Description: "URL CDN sécurisée pour accéder à la documentation technique"
    Value: !Sub "https://${CloudFrontDoc.DomainName}"

  S3BucketName:
    Description: "Nom du bucket S3 Data Lake"
    Value: !Ref DataLakeBucket

  DynamoDBTableName:
    Description: "Nom de la table DynamoDB Feature Store"
    Value: !Ref IoTMetricsTable

  ApiGatewayEndpoint:
    Description: "URL directe API Gateway (debug uniquement)"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
